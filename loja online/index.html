<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>Mini E-commerce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="../projeto site/index.html" class="btn-voltar">← Voltar ao Menu</a>
            <h1>Loja Dos Kimono Mas Top JS</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="toggle-area">
                <input type="checkbox" id="temaChecbox">
                <label for="temaChecbox" id="labelTema">
                   🌓 Modo Escuro
                </label>
            </div>
            <div id="carrinho-info">
                🛒 Itens: <span id="quantidade">0</span>
            </div>
        </div>
    </header>
    <main>
        <section id="produtos"></section>

        <aside>
            <h2>Carrinho</h2>
            <ul id="lista-carrinho"></ul>

            <div class="total-box">
                <h3>Total</h3>
                <strong>R$ <span id="total">0.00</span></strong>
            </div>

            <div class="buy-area">
                <button id="botao-comprar" class="btn-comprar" style="display: none;">Compra ae pra fortalece</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- janela de Descrição do Produto -->
    <div id="descricaoModal" class="modal-hidden">
        <div class="modal-overlay" id="descOverlay"></div>
        <div class="modal-card">
            <button class="modal-close" id="descClose">×</button>
            <h3 id="descTitulo">Título</h3>
            <p id="descTexto">Descrição do produto...</p>
        </div>
    </div>

</body>
</html>
