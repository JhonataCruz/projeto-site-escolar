<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>Mini lojinha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="../projeto site/index.html" class="btn-voltar">← Voltar ao Menu</a>
            <h1>Loja Dos Kimono Mas Top JS</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="toggle-area">
                <input type="checkbox" id="temaChecbox">
                <label for="temaChecbox" id="labelTema">
                   🌓 tema
                </label>
            </div>
            <div id="carrinho-info">
                🛒 Itens: <span id="quantidade">0</span>
            </div>
        </div>
    </header>
    <main>
        <section id="produtos"></section>

        <aside>
            <h2>Carrinho</h2>
            <ul id="lista-carrinho"></ul>

            <div class="total-box">
                <h3>Total</h3>
                <strong>R$ <span id="total">0.00</span></strong>
            </div>

            <div class="buy-area">
                <button id="botao-comprar" class="btn-comprar" style="display: none;">Compra ae pra fortalece</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- janela de Descrição do Produto -->
    <div id="descricaoModal" class="modal-hidden">
        <div class="modal-overlay" id="descOverlay"></div>
        <div class="modal-card">
            <button class="modal-close" id="descClose">×</button>
            <h3 id="descTitulo">Título</h3>
            <p id="descTexto">Descrição do produto...</p>
        </div>
    </div>

    <!-- Moelo de Seleção de Pagamentoss -->
    <div id="pagamentoModal" class="modal-hidden">
        <div class="modal-overlay" id="pagOverlay"></div>
        <div class="modal-card payment-modal">
            <button class="modal-close" id="pagClose">×</button>
            <h3>Escolha o Método de Pagamento</h3>
            <div class="payment-methods">
                <button class="payment-btn" data-method="pix">💳 PIX</button>
                <button class="payment-btn" data-method="credito">💰 Crédito</button>
                <button class="payment-btn" data-method="debito">🏦 Débito</button>
            </div>
        </div>
    </div>

    <!-- Modelo de PIX -->
    <div id="pixModal" class="modal-hidden">
        <div class="modal-overlay" id="pixOverlay"></div>
        <div class="modal-card payment-modal">
            <button class="modal-close" id="pixClose">×</button>
            <h3>Pagamento por PIX</h3>
            <div class="pix-info">
                <p><strong>Número PIX:</strong></p>
                <p class="pix-number">40028922</p>
                <p><strong>Valor da Compra:</strong></p>
                <p class="pix-value">R$ 0.01</p>
                <button class="btn-confirm" id="pixConfirm">Confirmar Pagamento</button>
                <button class="btn-back" id="pixBack">Voltar</button>
            </div>
        </div>
    </div>

    <!-- Modelo do credito e debitp -->
    <div id="cartaoModal" class="modal-hidden">
        <div class="modal-overlay" id="cartaoOverlay"></div>
        <div class="modal-card payment-modal">
            <button class="modal-close" id="cartaoClose">×</button>
            <h3 id="cartaoTitle">Informações do Cartão</h3>
            <form id="cartaoForm">
                <div class="form-group">
                    <label>Número do Cartão</label>
                    <input type="text" id="numeroCartao" placeholder="1234 5678 9012 3456" maxlength="19">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Validade (MM/AA)</label>
                        <input type="text" id="validade" placeholder="12/25" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="3">
                    </div>
                </div>
                <div class="form-group">
                    <label>Nome do Titular</label>
                    <input type="text" id="nomeTitular" placeholder="Jonas Melhor Professor">
                </div>

                <!-- Opcao da parcelinha só pra crédito -->
                <div id="parcelamentoDiv" style="display: none;">
                    <label>Parcelamento</label>
                    <select id="parcelamento">
                        <option value="1">1x sem juros - R$ 0.00</option>
                    </select>
                    <p id="parcelamentoInfo" style="font-size: 0.9rem; color: #6b7280; margin-top: 8px;"></p>
                </div>

                <button type="button" class="btn-confirm" id="cartaoConfirm">Confirmar Pagamento</button>
                <button type="button" class="btn-back" id="cartaoBack">Voltar</button>
            </form>
        </div>
    </div>

</body>
</html>
